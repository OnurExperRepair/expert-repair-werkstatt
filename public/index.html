<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="ER Werkstatt">
  <meta name="theme-color" content="#0a0908">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <link rel="icon" type="image/png" href="/icon-192.png">
  <title>Expert Repair · Werkstatt</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,300..800&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500;700&family=Noto+Sans+Arabic:wght@400;500;600&display=swap" rel="stylesheet">
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { margin: 0; background: #0a0908; }
    * { -webkit-tap-highlight-color: transparent; }
    #root { min-height: 100vh; }
    .loading-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; color: #f0e9dc; font-family: system-ui, sans-serif; }
  </style>
</head>
<body>
  <div id="root">
    <div class="loading-screen">
      <div style="text-align: center;">
        <div style="width: 48px; height: 48px; background: #e8904b; border-radius: 8px; margin: 0 auto 16px; display: flex; align-items: center; justify-content: center; color: #0a0908; font-weight: bold; font-size: 24px;">ER</div>
        <div>App wird geladen...</div>
      </div>
    </div>
  </div>
  <script type="text/babel" data-presets="react" data-type="module">
    // App-Code wird hier geladen
    fetch('/app.jsx')
      .then(r => r.text())
      .then(code => {
        const transformed = Babel.transform(code, { presets: ['react'] }).code;
        const script = document.createElement('script');
        script.textContent = transformed;
        document.body.appendChild(script);
      })
      .catch(err => {
        document.getElementById('root').innerHTML = '<div class="loading-screen"><div style="text-align:center;color:#e87a5b;"><div>Fehler beim Laden der App</div><div style="font-size:12px;margin-top:8px;color:#857d70;">' + err.message + '</div></div></div>';
      });
  </script>
</body>
</html>
