<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0a0908">
  <title>Reparatur-Status · Expert Repair</title>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@300..700&family=Instrument+Serif:ital@1&family=JetBrains+Mono&family=Noto+Sans+Arabic&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a0908; color: #f0e9dc; font-family: 'Bricolage Grotesque', system-ui, sans-serif; min-height: 100vh; }
    .container { max-width: 28rem; margin: 0 auto; padding: 3rem 1.5rem; }
    .center { text-align: center; }
    .logo-mark { width: 3rem; height: 3rem; border-radius: 0.375rem; background: #e8904b; color: #0a0908; display: flex; align-items: center; justify-content: center; margin: 0 auto 1rem; }
    .display-serif { font-family: 'Instrument Serif', serif; font-style: italic; }
    .mono { font-family: 'JetBrains Mono', monospace; }
    .text-2xl { font-size: 1.5rem; }
    .text-3xl { font-size: 1.875rem; }
    .text-xl { font-size: 1.25rem; }
    .text-sm { font-size: 0.875rem; }
    .text-xs { font-size: 0.75rem; }
    .text-tiny { font-size: 0.625rem; letter-spacing: 0.25em; text-transform: uppercase; }
    .card { background: #13110e; border: 1px solid #1f1c17; border-radius: 0.5rem; padding: 1.25rem; margin-bottom: 1.5rem; }
    .timeline-row { display: flex; align-items: center; gap: 1rem; margin-bottom: 1.25rem; }
    .timeline-row:last-child { margin-bottom: 0; }
    .timeline-dot { position: relative; width: 2.25rem; height: 2.25rem; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .timeline-pulse { position: absolute; inset: -0.25rem; border-radius: 50%; opacity: 0.4; animation: pulse 2s ease-in-out infinite; }
    @keyframes pulse { 0%,100% { opacity: 0.4; } 50% { opacity: 1; } }
    @keyframes fadeup { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .fadeup { animation: fadeup 0.5s ease-out forwards; }
    .arabic { font-family: 'Noto Sans Arabic', 'Bricolage Grotesque', sans-serif; }
    .footer { padding-top: 1.5rem; border-top: 1px solid #1f1c17; color: #5c554a; }
    .error-icon { background: #3a1f1a; }
    svg { display: block; }
  </style>
</head>
<body>
  <div id="content" class="container fadeup">
    <div class="center">
      <div class="logo-mark">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>
      </div>
      <div class="text-2xl">
        <span class="display-serif">Expert</span><span style="color:#857d70;font-weight:300;"> Repair</span>
      </div>
      <div class="mono text-tiny" style="color:#857d70; margin-top:0.5rem;">Berlin</div>
    </div>
    <div id="body" style="margin-top:2.5rem;">Laden...</div>
  </div>

<script>
const STATUSES = {
  eingegangen: { color: '#857d70', bg: '#1f1c17',
    i18n: { de: 'Eingegangen', tr: 'Alındı', en: 'Received', ar: 'تم الاستلام', ru: 'Принято' } },
  in_arbeit: { color: '#e8b04b', bg: '#3a2f1a',
    i18n: { de: 'In Arbeit', tr: 'Tamir Ediliyor', en: 'In Progress', ar: 'قيد الإصلاح', ru: 'В работе' } },
  fertig: { color: '#7dd99c', bg: '#1a3a2a',
    i18n: { de: 'Fertig zur Abholung', tr: 'Teslim Almaya Hazır', en: 'Ready for Pickup', ar: 'جاهز للاستلام', ru: 'Готово к выдаче' } },
  abgeholt: { color: '#5c554a', bg: '#1a1815',
    i18n: { de: 'Abgeholt', tr: 'Teslim Alındı', en: 'Picked Up', ar: 'تم الاستلام', ru: 'Получено' } },
};

const I18N = {
  de: { greeting: 'Hallo', tracking: 'Reparatur-Status', order: 'Auftragsnummer', device: 'Gerät', updated: 'Letzte Aktualisierung', shop: 'Bei Fragen kontaktieren Sie uns', current: 'Aktuell' },
  tr: { greeting: 'Merhaba', tracking: 'Tamir Durumu', order: 'İş Numarası', device: 'Cihaz', updated: 'Son güncelleme', shop: 'Sorularınız için bizimle iletişime geçin', current: 'Şu an' },
  en: { greeting: 'Hello', tracking: 'Repair Status', order: 'Order Number', device: 'Device', updated: 'Last update', shop: 'Contact us for questions', current: 'Current' },
  ar: { greeting: 'مرحباً', tracking: 'حالة الإصلاح', order: 'رقم الطلب', device: 'الجهاز', updated: 'آخر تحديث', shop: 'تواصل معنا لأي استفسار', current: 'الحالي' },
  ru: { greeting: 'Здравствуйте', tracking: 'Статус ремонта', order: 'Номер заказа', device: 'Устройство', updated: 'Последнее обновление', shop: 'Свяжитесь с нами при вопросах', current: 'Сейчас' },
};

function formatDate(iso) {
  const d = new Date(iso);
  return d.toLocaleString('de-DE', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' });
}

function showError(msg) {
  document.getElementById('body').innerHTML = `
    <div class="card">
      <div class="center">
        <div class="logo-mark error-icon" style="margin-bottom:1rem;">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#e87a5b" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        </div>
        <div class="text-xl" style="margin-bottom:0.5rem;">Auftrag nicht gefunden</div>
        <div class="text-sm" style="color:#857d70;">${msg || 'Bitte prüfen Sie Ihre Auftragsnummer.'}</div>
      </div>
    </div>
  `;
}

function render(data) {
  const lang = data.language || 'de';
  const t = I18N[lang] || I18N.de;
  const isRTL = lang === 'ar';
  if (isRTL) document.body.setAttribute('dir', 'rtl');
  if (isRTL) document.body.classList.add('arabic');

  const statusOrder = ['eingegangen', 'in_arbeit', 'fertig', 'abgeholt'];
  const currentIdx = data.status === 'wartet_auf_teile' ? 1 : statusOrder.indexOf(data.status);

  const timeline = statusOrder.map((sk, i) => {
    const sst = STATUSES[sk];
    const reached = i <= currentIdx;
    const current = i === currentIdx && data.status !== 'abgeholt';
    return `
      <div class="timeline-row">
        <div class="timeline-dot" style="background:${reached ? sst.bg : '#1f1c17'}; border:2px solid ${reached ? sst.color : '#2a2620'};">
          ${current ? `<div class="timeline-pulse" style="border:2px solid ${sst.color};"></div>` : ''}
          <div style="width:0.5rem;height:0.5rem;border-radius:50%;background:${reached ? sst.color : '#5c554a'};"></div>
        </div>
        <div>
          <div style="color:${reached ? '#f0e9dc' : '#5c554a'};">${sst.i18n[lang] || sst.i18n.de}</div>
          ${current ? `<div class="mono text-tiny" style="color:${sst.color}; margin-top:0.125rem;">● ${t.current}</div>` : ''}
        </div>
      </div>
    `;
  }).join('');

  document.getElementById('body').innerHTML = `
    <div class="text-xl" style="color:#a89e8d; margin-bottom:0.5rem;">${t.greeting} ${data.customer_first_name},</div>
    <div class="text-3xl display-serif" style="margin-bottom:2rem;">${t.tracking}</div>

    <div class="card">
      <div class="mono text-tiny" style="color:#857d70; margin-bottom:0.5rem;">${t.device}</div>
      <div class="text-xl" style="margin-bottom:0.75rem;">${data.device}</div>
      <div class="mono text-tiny" style="color:#857d70; margin-bottom:0.25rem;">${t.order}</div>
      <div class="text-sm mono" style="color:#e8904b;">#J${data.id}</div>
    </div>

    <div class="card">
      <div class="mono text-tiny" style="color:#857d70; margin-bottom:1.25rem;">${t.tracking}</div>
      ${timeline}
    </div>

    <div class="center text-xs" style="color:#857d70; margin-bottom:2rem;">
      ${t.updated}: <span class="mono">${formatDate(data.updated_at)}</span>
    </div>

    <div class="center text-xs footer">
      ${t.shop}<br>
      <span style="color:#a89e8d;">Expert Repair · Berlin</span>
    </div>
  `;
}

// Auftragsnr. aus Pfad oder Query holen
function getJobId() {
  const path = window.location.pathname;
  // /track/J123 → 123
  const m = path.match(/\/track\/(.+)/);
  if (m) return m[1].replace(/^J/i, '');
  const params = new URLSearchParams(window.location.search);
  return (params.get('id') || '').replace(/^J/i, '');
}

const id = getJobId();
if (!id) {
  showError('Keine Auftragsnummer angegeben.');
} else {
  fetch('/api/track?id=' + encodeURIComponent(id))
    .then(r => {
      if (!r.ok) throw new Error('Auftrag nicht gefunden');
      return r.json();
    })
    .then(render)
    .catch(err => showError(err.message));
}
</script>
</body>
</html>
